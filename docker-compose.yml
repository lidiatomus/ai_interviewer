version: "3.9"

services:
  db:
    image: postgres:15
    container_name: ai_interviewer_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_interviewer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: ai_interviewer_backend
    depends_on:
      - db
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    container_name: ai_interviewer_frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data: